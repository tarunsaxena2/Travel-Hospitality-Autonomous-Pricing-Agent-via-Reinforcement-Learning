<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="45%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f2994a"/>
      <stop offset="100%" stop-color="#f2c94c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <circle cx="1000" cy="80" r="220" fill="url(#glow)"/>
  <circle cx="150" cy="230" r="180" fill="url(#glow)"/>

  <!-- flight path dotted line -->
  <path d="M 60 210 Q 300 90 560 150 T 1120 90" stroke="#f2c94c" stroke-width="2" fill="none" stroke-dasharray="6 8" opacity="0.6"/>
  <!-- plane icon -->
  <g transform="translate(1090,80) rotate(-18)">
    <path d="M0 0 L28 6 L0 12 L6 6 Z" fill="#f2c94c"/>
  </g>

  <!-- title -->
  <text x="60" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">
    Dynamic Pricing Agent
  </text>
  <text x="60" y="168" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="url(#accent)">
    for Travel &amp; Hospitality
  </text>

  <!-- subtitle -->
  <text x="60" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#c9d6df">
    Autonomous revenue optimization powered by Deep Reinforcement Learning (DQN)
  </text>

  <!-- bottom tag row -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8fa3ad">
    <text x="60" y="248">🧠 Reinforcement Learning</text>
    <text x="290" y="248">📈 Dynamic Pricing</text>
    <text x="470" y="248">🏨 Travel &amp; Hospitality</text>
    <text x="690" y="248">⚙️ PyTorch · Gymnasium</text>
  </g>
</svg>
