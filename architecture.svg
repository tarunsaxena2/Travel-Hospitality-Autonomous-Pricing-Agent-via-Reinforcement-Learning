<svg viewBox="0 0 1100 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardEnv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c5364"/>
      <stop offset="100%" stop-color="#0f2027"/>
    </linearGradient>
    <linearGradient id="cardAgent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2994a"/>
      <stop offset="100%" stop-color="#d3722f"/>
    </linearGradient>
    <linearGradient id="cardEval" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a6073"/>
      <stop offset="100%" stop-color="#16222a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7f88"/>
    </marker>
  </defs>

  <rect width="1100" height="420" fill="#ffffff"/>

  <!-- Environment card -->
  <rect x="40" y="60" width="280" height="140" rx="16" fill="url(#cardEnv)"/>
  <text x="180" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#fff">Booking Environment</text>
  <text x="180" y="130" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#cfe3ea">Gymnasium custom env</text>
  <text x="180" y="155" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#cfe3ea">demand · time-to-departure</text>
  <text x="180" y="177" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#cfe3ea">inventory · competitor price</text>

  <!-- Agent card -->
  <rect x="420" y="60" width="280" height="140" rx="16" fill="url(#cardAgent)"/>
  <text x="560" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#fff">DQN Agent</text>
  <text x="560" y="130" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#fff0e0">PyTorch neural network</text>
  <text x="560" y="155" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#fff0e0">Q-value estimation</text>
  <text x="560" y="177" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#fff0e0">ε-greedy price selection</text>

  <!-- Eval card -->
  <rect x="800" y="60" width="260" height="140" rx="16" fill="url(#cardEval)"/>
  <text x="930" y="105" text-anchor="middle" font-family="Segoe UI, Arial" font-size="20" font-weight="700" fill="#fff">Policy Evaluation</text>
  <text x="930" y="130" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#cfe3ea">revenue comparison</text>
  <text x="930" y="155" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#cfe3ea">vs. heuristic baselines</text>
  <text x="930" y="177" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#cfe3ea">reward curve analysis</text>

  <!-- arrows top row -->
  <path d="M320 130 H420" stroke="#6b7f88" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="370" y="120" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#6b7f88">state</text>

  <path d="M700 130 H800" stroke="#6b7f88" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="750" y="120" text-anchor="middle" font-family="Segoe UI, Arial" font-size="12" fill="#6b7f88">results</text>

  <!-- feedback loop: agent -> env (action) -->
  <path d="M560 200 C 560 260, 180 260, 180 200" stroke="#f2994a" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="370" y="278" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#d3722f" font-weight="600">action: set price</text>

  <!-- reward loop: env -> agent -->
  <path d="M280 60 C 280 20, 500 20, 500 60" stroke="#2c5364" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="390" y="30" text-anchor="middle" font-family="Segoe UI, Arial" font-size="13" fill="#2c5364" font-weight="600">reward: revenue</text>

  <!-- bottom baseline comparison strip -->
  <rect x="40" y="330" width="1020" height="70" rx="14" fill="#f4f6f7"/>
  <text x="65" y="358" font-family="Segoe UI, Arial" font-size="13" font-weight="700" fill="#203a43">Benchmarked against:</text>
  <text x="65" y="380" font-family="Segoe UI, Arial" font-size="13" fill="#4a5a61">🔒 Fixed Pricing</text>
  <text x="280" y="380" font-family="Segoe UI, Arial" font-size="13" fill="#4a5a61">⏳ Time-based Discounting</text>
  <text x="560" y="380" font-family="Segoe UI, Arial" font-size="13" fill="#4a5a61">📈 Demand-based Pricing</text>
  <text x="820" y="380" font-family="Segoe UI, Arial" font-size="13" fill="#4a5a61">🎯 RL Agent (this project)</text>
</svg>
